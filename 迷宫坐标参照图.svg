<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <rect width="100%" height="100%" fill="#171122"/>
  <style>
    .cell { fill:#2c2141; stroke:#9f78d9; stroke-width:2.4; }
    .label {
      font: 800 24px "Segoe UI", Arial, sans-serif;
      fill:#fff7c7;
      text-anchor:middle;
      dominant-baseline:middle;
    }
    .title { font: 800 26px "Segoe UI", Arial, sans-serif; fill:#ffffff; }
    .note { font: 16px "Segoe UI", Arial, sans-serif; fill:#cbb8ff; text-anchor:middle; }
